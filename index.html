<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yotalab</title>
  <style>
    :root {
      --bg: #F8F9FC;
      --card: #FFFFFF;
      --text: #545051;
      --sub: #7B86AA;
      --accent: #738BE7;
      --accent2: #5B67A2;
      --border: rgba(91,103,162,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "ヒラギノ角ゴシック", sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, rgba(191,200,234,0.35) 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    h1 {
      font-size: 36px;
      font-weight: 800;
      margin: 0 0 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      color: var(--sub);
      font-size: 16px;
      margin: 0 0 48px;
    }
    h2 {
      font-size: 20px;
      color: var(--text);
      margin: 48px 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(91,103,162,0.08);
      margin-bottom: 16px;
    }
    .card h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .card p {
      margin: 0 0 12px;
      color: var(--sub);
      font-size: 14px;
    }
    .card a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .card a:hover { text-decoration: underline; }
    footer {
      margin-top: 80px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--sub);
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>yotalab</h1>
    <p class="tagline">iOS apps for everyday learning.</p>

    <h2>Apps</h2>

    <div class="card">
      <h3>英単語かるた</h3>
      <p>CEFR-J 準拠 約7,600語。タップで瞬発的に覚える英単語マッチングゲーム。</p>
      <a href="english-karuta/privacy.html">Privacy Policy →</a>
    </div>

    <footer>
      © 2026 yotalab
    </footer>
  </div>
</body>
</html>
