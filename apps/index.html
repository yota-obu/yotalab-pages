<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps - yotalab</title>
  <meta name="description" content="yotalab のアプリ一覧">
  <style>
    :root {
      --bg: #fbfbfd;
      --text: #1d1d1f;
      --sub: #6e6e73;
      --accent: #738BE7;
      --accent2: #5B67A2;
      --border: rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", "ヒラギノ角ゴシック", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(251,251,253,0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--border);
    }
    nav .nav-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 22px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .logo {
      font-size: 21px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    nav .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    nav .nav-links a {
      font-size: 14px;
      color: var(--sub);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav .nav-links a:hover { color: var(--text); }
    nav .nav-links a.active { color: var(--text); font-weight: 500; }

    /* Page Header */
    .page-header {
      padding: 120px 24px 60px;
      text-align: center;
    }
    .page-header h1 {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 800;
      letter-spacing: -1.5px;
    }
    .page-header p {
      font-size: 19px;
      color: var(--sub);
      margin-top: 12px;
    }

    /* App Grid */
    .app-section {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 22px 120px;
    }
    .app-card {
      display: flex;
      align-items: center;
      gap: 32px;
      background: #fff;
      border-radius: 24px;
      padding: 36px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 16px rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.3s;
      margin-bottom: 20px;
    }
    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.08);
    }
    .app-icon {
      width: 120px;
      height: 120px;
      border-radius: 27px;
      flex-shrink: 0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .app-info {
      flex: 1;
    }
    .app-info h2 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .app-info .en-name {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 10px;
    }
    .app-info .tagline {
      font-size: 16px;
      color: #424245;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .app-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .app-meta .badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 100px;
      background: rgba(115,139,231,0.1);
      color: var(--accent);
    }
    .app-meta .badge.platform {
      background: rgba(0,0,0,0.05);
      color: var(--sub);
    }
    .arrow {
      font-size: 20px;
      color: #c7c7cc;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .app-card:hover .arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 22px;
      text-align: center;
    }
    footer .footer-inner {
      max-width: 980px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    footer p {
      font-size: 13px;
      color: var(--sub);
    }
    footer a {
      font-size: 13px;
      color: var(--sub);
      text-decoration: none;
    }
    footer a:hover { color: var(--text); }
    footer .footer-links {
      display: flex;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .app-card {
        flex-direction: column;
        text-align: center;
        padding: 28px 24px;
        gap: 20px;
      }
      .app-meta { justify-content: center; }
      .arrow { display: none; }
      footer .footer-inner {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="../" class="logo">yotalab</a>
      <ul class="nav-links">
        <li><a href="./" class="active">Apps</a></li>
        <li><a href="mailto:yotalab.tech@gmail.com">Contact</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <h1>Apps</h1>
    <p>日常の学びをもっと楽しく。</p>
  </div>

  <div class="app-section">
    <a class="app-card" href="english-karuta/">
      <img class="app-icon" src="../assets/english-karuta-icon.png" alt="英単語かるた">
      <div class="app-info">
        <h2>英単語かるた</h2>
        <p class="en-name">English Vocabulary Karuta</p>
        <p class="tagline">タップ、ひらめく、覚える。CEFR-J 準拠 約7,600語を収録した英単語マッチングゲーム。60秒チャレンジとタイムアタックの2モードで、スキマ時間に語彙力を鍛えます。</p>
        <div class="app-meta">
          <span class="badge">教育</span>
          <span class="badge platform">iPhone</span>
          <span class="badge platform">無料</span>
        </div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <footer>
    <div class="footer-inner">
      <p>© 2026 yotalab</p>
      <div class="footer-links">
        <a href="../">Home</a>
        <a href="mailto:yotalab.tech@gmail.com">Contact</a>
      </div>
    </div>
  </footer>
</body>
</html>
